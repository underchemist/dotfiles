packages:
  linux:
    base_deps:
      - "curl"
      - "ca-certificates"
    deps:
      - "git"
      - "vim"
      - "docker-ce"
      - "docker-ce-cli"
      - "containerd.io"
      - "docker-buildx-plugin"
      - "docker-compose-plugin"
      - "jq"
      - "gh"
      - "zsh"
      - "ripgrep"
      - "build-essential"
      - "shellcheck"
      - "direnv"
      - "tmux"
      - "libclang-dev"
      - "wl-clipboard"
    precompiled_binary_versions:
      nvim:
          version: 0.12.1
      fzf:
          version: 0.71.0
      bat:
          version: 0.26.1
